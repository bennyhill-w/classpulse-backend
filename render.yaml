services:
  - type: web
    name: classpulse-backend
    runtime: node
    buildCommand: npm install && npx prisma generate
    startCommand: npx prisma migrate deploy && node src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: classpulse-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 24h
      - key: SCHOOL_LAT
        value: 6.6018
      - key: SCHOOL_LNG
        value: 3.3515
      - key: SCHOOL_RADIUS_KM
        value: 0.15
      - key: SCHOOL_START_TIME
        value: "08:00"
      - key: LATE_THRESHOLD_MINS
        value: 15
      - key: IDLE_THRESHOLD_MINS
        value: 15

databases:
  - name: classpulse-db
    databaseName: classpulse
    user: classpulse_user
